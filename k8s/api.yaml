apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: race-time/api:latest
          imagePullPolicy: Never
          command: ["/app/entrypoint-api.sh"]
          ports:
            - containerPort: 8000
          env:
            - name: REDIS_URL
              value: "redis://redis:6379/0"
            - name: LOG_LEVEL
              value: "info"
            - name: OPENF1_USERNAME
              valueFrom:
                secretKeyRef:
                  name: openf1-credentials
                  key: username
            - name: OPENF1_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: openf1-credentials
                  key: password
---
apiVersion: v1
kind: Service
metadata:
  name: api
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
