services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 20

  api:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      OPENF1_USERNAME: ${OPENF1_USERNAME}
      OPENF1_PASSWORD: ${OPENF1_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["/app/entrypoint-api.sh"]

  poller:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      POLL_INTERVAL_SECONDS: 1.25
      CIRCUIT_SVG_PATH: /data/circuits/svgs/Monte_Carlo_22.svg
    volumes:
      - ./scripts/output:/data/circuits
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["/app/entrypoint-poller.sh"]
    profiles:
      - dev

  mqtt-worker:
    build: ./backend
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: info
      OPENF1_USERNAME: ${OPENF1_USERNAME}
      OPENF1_PASSWORD: ${OPENF1_PASSWORD}
      MQTT_HOST: ${MQTT_HOST:-mqtt.openf1.org}
      MQTT_PORT: ${MQTT_PORT:-8883}
    depends_on:
      redis:
        condition: service_healthy
    entrypoint: ["/app/entrypoint-mqtt-worker.sh"]
    profiles:
      - premium

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - api

volumes:
  redis_data:
